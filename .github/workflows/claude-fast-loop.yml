# Fast loop: fires on every comment/review but SKIPS before a runner is
# allocated unless the issue/PR carries the `claude-active` label. That label is
# applied by the scheduled triage routines when Claude first engages (comments
# or opens a PR), so you only pay the fast-loop cost on items Claude has claimed.
# The slow intake gate stays the /schedule cron routines; this is the quick
# follow-up loop for items already in flight.
name: Claude fast loop (claimed items only)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  # Manual "pick this up now" kick: apply the `claude-go` label to jump the
  # daily-cron queue on an urgent item.
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

# Serialise runs per issue/PR so a fast-loop response and the next cron tick
# can't both drive the same item at once and produce conflicting commits.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    # Loop protection first: never react to a bot's own output. Then two entry
    # paths, deliberately split by event so the cron stamping `claude-active`
    # can NOT trigger this:
    #   - label events (issues/pull_request): fire ONLY when the label just
    #     added is `claude-go` (a human kick). A `claude-active` label add does
    #     not match, so the cron's own labelling never starts a run.
    #   - comment/review events: fire only on items already carrying
    #     `claude-active`. (PRs are issues underneath, so the labels live on
    #     github.event.issue.labels for issue_comment.)
    if: >
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]' &&
      (
        (
          (github.event_name == 'issues' || github.event_name == 'pull_request') &&
          github.event.label.name == 'claude-go'
        ) ||
        (
          github.event_name != 'issues' && github.event_name != 'pull_request' &&
          (contains(github.event.issue.labels.*.name, 'claude-active') ||
           contains(github.event.pull_request.labels.*.name, 'claude-active'))
        )
      )
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write   # required by claude-code-action@v1 to fetch its OIDC token
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for diff context

      # Node + pnpm + deps so Claude can actually run `pnpm test` / `pnpm build`
      # while working (matches the deploy workflow's toolchain versions).
      - uses: pnpm/action-setup@v5
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are working an issue/PR for the ATT / paddlesnitch repo. You were
            triggered one of two ways:
              - a human left the latest comment/review on a claimed
                (claude-active) item — read it and act; OR
              - a human just applied the `claude-go` label to ask you to pick the
                item up right away — read the whole issue/PR from scratch and
                start working it toward resolution.
            In the `claude-go` case, once you've engaged (posted your comment /
            opened a PR), also run, as your LAST step:
              gh issue edit <n> --add-label claude-active --remove-label claude-go
            (or `gh pr edit <n> ...`) so future comments enter the normal fast
            loop and the kick label is cleared.
            Node, pnpm, and dependencies are already installed, so you can run
            `pnpm test` / `pnpm build` directly.

            IMPORTANT — how to reply: your final text output is NOT shown to
            anyone. To communicate you MUST post a GitHub comment yourself with
            the gh CLI (GITHUB_TOKEN is already in the environment):
              - on an issue:  gh issue comment <number> --body "..."
              - on a PR:      gh pr comment <number> --body "..."
            Determine the number from the event context. ALWAYS post exactly one
            such comment before you finish — even if it's just a short status.

            FIRST read CLAUDE.md at the repo root — it is the source of truth for
            conventions you MUST follow (test-first; `pnpm test` AND `pnpm build`
            must both pass before you push anything; match existing style; the
            commit-message trailer used in recent commits).

            Rules:
            - This runs on an existing PR or issue. If a PR branch exists, push
              your changes to THAT branch — never to `main`, never force-push,
              never merge.
            - Every code change ships with a test and green `pnpm test` +
              `pnpm build`. If you can't get them green, do NOT push — post a
              comment with what's blocking instead.
            - Out of scope (post a comment asking the author, don't touch): auth,
              secrets, billing, or production infra (CDK / SES / Cognito / IAM /
              deploy).
            - If the latest comment is a question or needs a product decision,
              post a concise answer or a specific clarifying question — don't guess.
            - Keep comments short. If the work is complete, say so explicitly so a
              human can merge.
          # Allow the tools the loop needs to actually work (same trust model as
          # the scheduled cron routines). The action keeps its own GitHub
          # progress-comment tool regardless.
          claude_args: "--max-turns 25 --model claude-opus-4-8 --allowedTools Bash,Read,Edit,Write,Glob,Grep"
